<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Formulario conectado a Drive</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #logs { background: #f4f4f4; padding: 10px; border: 1px solid #ccc; margin-top: 20px; }
    pre { white-space: pre-wrap; word-wrap: break-word; }
  </style>
</head>
<body>
  <h2>Enviar datos a Drive</h2>
  <form id="dataForm">
    <label>Nombre:</label>
    <input type="text" id="nombre" required><br><br>
    <label>Mensaje:</label>
    <input type="text" id="mensaje" required><br><br>
    <button type="submit">Enviar</button>
  </form>

  <h2>Leer archivo público de Drive</h2>
  <button id="leerBtn">Leer archivo</button>
  <pre id="contenido"></pre>

  <h2>Logs</h2>
  <div id="logs"></div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzudQ5fqVvmH8l3ZGVjOQSMMu3uYRKYaWRZ2w86UC_nk9et6ol6t8WlYF1PKquevYzh/exec";
    const DRIVE_FILE_URL = "https://drive.google.com/uc?export=download&id=TU_ID_DE_ARCHIVO";

    function log(msg) {
      const logs = document.getElementById("logs");
      logs.innerHTML += "<pre>" + msg + "</pre>";
    }

    document.getElementById("dataForm").addEventListener("submit", function(e){
      e.preventDefault();
      const data = {
        nombre: document.getElementById("nombre").value,
        mensaje: document.getElementById("mensaje").value
      };
      log("Enviando datos: " + JSON.stringify(data));

      fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify(data)
      })
      .then(res => res.text())
      .then(txt => {
        log("Respuesta del servidor: " + txt);
        alert("Respuesta: " + txt);
      })
      .catch(err => {
        log("Error: " + err);
        console.error(err);
      });
    });

    document.getElementById("leerBtn").addEventListener("click", function(){
      log("Leyendo archivo público de Drive...");
      fetch(DRIVE_FILE_URL)
        .then(res => res.text())
        .then(txt => {
          document.getElementById("contenido").textContent = txt;
          log("Contenido leído correctamente.");
        })
        .catch(err => {
          log("Error al leer archivo: " + err);
          console.error(err);
        });
    });
  </script>
</body>
</html>
