<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Proyecto Drive Autorizado</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="config.js"></script>
  <style>
    #authNotice {
      display: none;
      background: #ffe0e0;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #cc0000;
    }
  </style>
</head>
<body>
  <h1>Login y escritura en Drive</h1>

  <div id="g_id_onload"
       data-client_id="527108731574-nvkf2sovotbn1vtq7fnh42o6ujkt9lj7.apps.googleusercontent.com"
       data-callback="handleCredentialResponse">
  </div>
  <div class="g_id_signin" data-type="standard"></div>

  <div id="authNotice">
    ⚠️ Este proyecto necesita autorización de Drive.  
    Ejecutá una vez la función <b>initAuth</b> en el editor de Apps Script para conceder permisos.
  </div>

  <form id="formulario">
    <input type="text" id="nombre" placeholder="Nombre">
    <input type="text" id="mensaje" placeholder="Mensaje">
    <button type="submit">Enviar</button>
  </form>

  <pre id="resultado"></pre>

  <script>
    let idToken = null;

    function handleCredentialResponse(response) {
      idToken = response.credential;
      document.getElementById("resultado").textContent = "Login exitoso. Token recibido.";
      document.getElementById("authNotice").style.display = "block";
    }

    document.getElementById("formulario").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!idToken) {
        alert("Primero inicia sesión con Google");
        return;
      }

      const data = {
        token: idToken,
        nombre: document.getElementById("nombre").value,
        mensaje: document.getElementById("mensaje").value
      };

      const res = await fetch(CONFIG.SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify(data)
      });

      const json = await res.json();
      document.getElementById("resultado").textContent = JSON.stringify(json, null, 2);
    });
  </script>
</body>
</html>
