<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Formulario con Google Auth + Logs</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #logs { background: #f4f4f4; padding: 10px; border: 1px solid #ccc; margin-top: 20px; max-height: 300px; overflow-y: auto; }
    pre { white-space: pre-wrap; word-wrap: break-word; margin: 0; }
    .ok { color: green; }
    .error { color: red; }
  </style>
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <h2>Login con Google</h2>
  <div id="g_id_onload"
       data-client_id="527108731574-nvkf2sovotbn1vtq7fnh42o6ujkt9lj7.apps.googleusercontent.com"
       data-context="signin"
       data-ux_mode="popup"
       data-callback="handleCredentialResponse"
       data-auto_prompt="false">
  </div>
  <div class="g_id_signin" data-type="standard"></div>

  <h2>Enviar datos a Drive</h2>
  <form id="dataForm">
    <label>Nombre:</label>
    <input type="text" id="nombre" required><br><br>
    <label>Mensaje:</label>
    <input type="text" id="mensaje" required><br><br>
    <button type="submit">Enviar</button>
  </form>

  <h2>Leer archivo público de Drive</h2>
  <button id="leerBtn">Leer archivo</button>
  <pre id="contenido"></pre>

  <h2>Logs</h2>
  <div id="logs"></div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzudQ5fqVvmH8l3ZGVjOQSMMu3uYRKYaWRZ2w86UC_nk9et6ol6t8WlYF1PKquevYzh/exec";
    const DRIVE_FILE_URL = "https://drive.google.com/uc?export=download&id=TU_ID_DE_ARCHIVO";

    let idToken = null; // token de Google

    function log(msg, type="info") {
      const logs = document.getElementById("logs");
      const line = document.createElement("pre");
      line.textContent = msg;
      if (type === "ok") line.classList.add("ok");
      if (type === "error") line.classList.add("error");
      logs.appendChild(line);
      logs.scrollTop = logs.scrollHeight;
    }

    // Callback de Google Identity Services
    function handleCredentialResponse(response) {
      idToken = response.credential;
      log("Login exitoso. Token recibido.", "ok");
    }

    // Enviar datos al Apps Script con token
    document.getElementById("dataForm").addEventListener("submit", function(e){
      e.preventDefault();
      if (!idToken) {
        alert("Primero iniciá sesión con Google.");
        return;
      }
      const data = {
        nombre: document.getElementById("nombre").value,
        mensaje: document.getElementById("mensaje").value
      };
      log("Enviando datos: " + JSON.stringify(data));

      fetch(SCRIPT_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + idToken
        },
        body: JSON.stringify(data)
      })
      .then(res => res.json())
      .then(json => {
        log("Estado: " + json.estado, json.estado === "ok" ? "ok" : "error");
        if (json.error) {
          log("Error: " + json.error, "error");
        }
        if (json.pasos) {
          json.pasos.forEach(p => log(p));
        }
      })
      .catch(err => {
        log("Error de red: " + err, "error");
      });
    });

    // Leer archivo público de Drive
    document.getElementById("leerBtn").addEventListener("click", function(){
      log("Leyendo archivo público de Drive...");
      fetch(DRIVE_FILE_URL)
        .then(res => res.json())
        .then(json => {
          document.getElementById("contenido").textContent = JSON.stringify(json, null, 2);
          log("Contenido leído correctamente.", "ok");
        })
        .catch(err => {
          log("Error al leer archivo: " + err, "error");
        });
    });
  </script>
</body>
</html>
