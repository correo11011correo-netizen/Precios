<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Test conexión con Apps Script (Library)</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #logs { background: #f4f4f4; padding: 10px; border: 1px solid #ccc; margin-top: 20px; max-height: 300px; overflow-y: auto; }
    pre { white-space: pre-wrap; word-wrap: break-word; margin: 0; }
    .ok { color: green; }
    .error { color: red; }
    .info { color: blue; }
  </style>
</head>
<body>
  <h2>Enviar datos a Drive</h2>
  <form id="dataForm">
    <label>Nombre:</label>
    <input type="text" id="nombre" required><br><br>
    <label>Mensaje:</label>
    <input type="text" id="mensaje" required><br><br>
    <button type="submit">Enviar</button>
  </form>

  <h2>Test de conexión con Apps Script</h2>
  <button id="testBtn">Probar conexión</button>

  <h2>Logs</h2>
  <div id="logs"></div>

  <script>
    // Nuevo enlace de la Library
    const SCRIPT_URL = "https://script.google.com/macros/library/d/1uDHBoemnYhE2ErYFza6ng2yHypJn-htTxr614iEmfKopGtR8ftXYCpq4/1/exec";

    function log(msg, type="info") {
      const logs = document.getElementById("logs");
      const line = document.createElement("pre");
      line.textContent = msg;
      line.classList.add(type);
      logs.appendChild(line);
      logs.scrollTop = logs.scrollHeight;
    }

    // Función para mostrar respuesta cruda y parseada
    function logResponse(res) {
      log("Status: " + res.status + " " + res.statusText, res.ok ? "ok" : "error");
      res.text().then(txt => {
        log("Respuesta cruda: " + txt, "info");
        try {
          const json = JSON.parse(txt);
          log("JSON parseado: " + JSON.stringify(json, null, 2), "info");
        } catch (err) {
          log("No se pudo parsear JSON: " + err, "error");
        }
      });
    }

    // Enviar datos (POST)
    document.getElementById("dataForm").addEventListener("submit", function(e){
      e.preventDefault();
      const data = {
        nombre: document.getElementById("nombre").value,
        mensaje: document.getElementById("mensaje").value
      };
      log("Enviando datos: " + JSON.stringify(data), "info");

      fetch(SCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      })
      .then(res => { logResponse(res); })
      .catch(err => log("Error de red: " + err, "error"));
    });

    // Test de conexión (GET)
    document.getElementById("testBtn").addEventListener("click", function(){
      log("Probando conexión con Apps Script...", "info");
      fetch(SCRIPT_URL)
        .then(res => { logResponse(res); })
        .catch(err => log("Error de red en test: " + err, "error"));
    });
  </script>
</body>
</html>
